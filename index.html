<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Ahok MAMEN</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">FITRAHinthesky</a>
        <div class="nav-links">
            <a href="#keahlian">Keahlian</a>
            <a href="#proyek">Proyek</a>
            <a href="#kontak">Kontak</a>
        </div>
    </nav>

    <div class="container animate-fade">
        <section class="hero">
            <div class="hero-text">
                <h1>Halo, Saya <br><span>Fitrah ilmi</span></h1>
                <p><b>Saya Adalah siswa SMK SWASTA MULTI KARYA MEDAN. YANG BERFOKUS JUAL/BELI GITAR</b></p>
                <a href="#kontak" class="btn">Go To Shop</a>
            </div>
            <div class="hero-image">
                <img src="https://i.pinimg.com/564x/72/dd/fa/72ddfab87a0e621fc543dc9a6ab96ad9.jpg">
            </div>
        </section>

        <h2 id="keahlian" class="section-title">Jenis Gitar</h2>
        <div class="skills-container">
            <span class="skill-badge"><i class="devicon-html5-plain" style="color: #e34f26; margin-right: 5px;"></i> akustik</span>
            <span class="skill-badge"><i class="devicon-css3-plain" style="color: #1572b6; margin-right: 5px;"></i> elektrik</span>
            <span class="skill-badge"><i class="devicon-javascript-plain" style="color: #f7df1e; margin-right: 5px;"></i> Bass</span>
            <span class="skill-badge"><i class="devicon-github-original" style="margin-right: 5px;"></i> Archtop</span>
            <span class="skill-badge"><i class="devicon-figma-plain" style="color: #F24E1E; margin-right: 5px;"></i> Solid Body</span>
        </div>

        <div class="section-alternate">
            <h2 id="proyek" class="section-title" style="margin-top: 0;">Gitaris Indonesia</h2>
            
            <div class="portfolio-grid" id="daftar-proyek">
                </div>
        </div>

        <h2 id="kontak" class="section-title">Hubungi Saya</h2>
        <div class="contact-links">
            <a href="mailto:email.siswa@gmail.com">Email</a>
            <a href="https://instagram.com/in/ahokgallagher" target="_blank">instagram</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 fitrah</p>
    </footer>

    <script src="data.js"></script>

    <script>
        const bagianProyek = document.getElementById('daftar-proyek');
        let htmlCard = '';

        for (const [id, data] of Object.entries(databaseProyek)) {
            
            let deskripsiSingkat = data.latar.substring(0, 90) + "...";

            htmlCard += `
                <div class="card">
                    <img src="${data.gambar}" alt="${data.judul}">
                    <div class="card-content">
                        <h3>${data.judul}</h3>
                        <p>${deskripsiSingkat}</p>
                        <a href="detail.html?id=${id}" class="btn btn-outline" style="text-align: center; display: block; margin-top: 15px;">Lihat Detail</a>
                    </div>
                </div>
            `;
        }

        bagianProyek.innerHTML = htmlCard;
    </script>

</body>
</html>
